server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      default-filters:
        - PreserveHostHeader

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

      routes:

        # ================= API ROUTES =================

        - id: auth-api
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**

        - id: user-api
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/users/**

        - id: admin-api
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/admin/**

        - id: student-api
          uri: lb://student-service
          predicates:
            - Path=/api/v1/students/**

        - id: grade-api
          uri: lb://grade-service
          predicates:
            - Path=/api/v1/grades/**

        - id: subject-api
          uri: lb://grade-service
          predicates:
            - Path=/api/v1/subjects/**

        - id: assignment-api
          uri: lb://grade-service
          predicates:
            - Path=/api/v1/assignments/**

        - id: analytics-api
          uri: lb://analytics-service
          predicates:
            - Path=/api/v1/analytics/**

        # ================= SWAGGER ROUTES =================

        - id: auth-docs
          uri: lb://auth-service
          predicates:
            - Path=/v3/api-docs/auth
          filters:
            - RewritePath=/v3/api-docs/auth, /v3/api-docs

        - id: student-docs
          uri: lb://student-service
          predicates:
            - Path=/v3/api-docs/student
          filters:
            - RewritePath=/v3/api-docs/student, /v3/api-docs

        - id: grade-docs
          uri: lb://grade-service
          predicates:
            - Path=/v3/api-docs/grade
          filters:
            - RewritePath=/v3/api-docs/grade, /v3/api-docs

        - id: analytics-docs
          uri: lb://analytics-service
          predicates:
            - Path=/v3/api-docs/analytics
          filters:
            - RewritePath=/v3/api-docs/analytics, /v3/api-docs

# ================= EUREKA =================
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

# ================= SWAGGER =================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-service
        url: /v3/api-docs/auth
      - name: student-service
        url: /v3/api-docs/student
      - name: grade-service
        url: /v3/api-docs/grade
      - name: analytics-service
        url: /v3/api-docs/analytics

# ================= SECURITY =================
security:
  jwt:
    secret: ${JWT_SECRET}

# ================= LOGGING =================
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG