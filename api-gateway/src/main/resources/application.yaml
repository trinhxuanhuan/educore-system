server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: auth-api
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**

        - id: user-api
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/users/**

        - id: student-api
          uri: lb://student-service
          predicates:
            - Path=/api/v1/students/**
        - id: grade-api
          uri: lb://grade-service
          predicates:
            - Path=/api/v1/grades/**
        - id: subject-api
          uri: lb://grade-service
          predicates:
            - Path=/api/v1/subjects/**
        - id: assignment-api
          uri: lb://grade-service
          predicates:
            - Path=/api/v1/assignments/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/