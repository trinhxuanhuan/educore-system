services:

  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - educore-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - educore-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - educore-network

  zipkin:
    image: openzipkin/zipkin:3
    restart: always
    ports:
      - "9411:9411"
    networks:
      - educore-network

  eureka-server:
    build: ./educore-eureka-server
    restart: always
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - educore-network

  auth-service:
    build: ./educore-auth-service # Kiểm tra lại tên folder thực tế của bạn
    container_name: auth-service
    restart: always
    depends_on:
      mysql:
        condition: service_healthy # Chỉ chạy khi MySQL đã Healthcheck thành công
      eureka-server:
        condition: service_healthy
    env_file:
      - .env # Ép Docker đọc file .env
    environment:
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@educore.local}
      - ADMIN_INIT_PASSWORD=${ADMIN_INIT_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    ports:
      - "8081:8081"
    networks:
      - educore-network

  student-service:
    build: ./educore-student-service
    restart: always
    depends_on:
      - mysql
      - kafka
      - eureka-server
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_SERVER: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/student_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8082:8082"
    networks:
      - educore-network

  grade-service:
    build: ./educore-grade-service
    restart: always
    depends_on:
      - mysql
      - kafka
      - eureka-server
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_SERVER: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/grade_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8083:8083"
    networks:
      - educore-network

  analytics-service:
    build: ./educore-analytics-service
    restart: always
    depends_on:
      - mysql
      - kafka
      - eureka-server
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_SERVER: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/analytics_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8084:8084"
    networks:
      - educore-network

  api-gateway:
    build: ./educore-api-gateway
    restart: always
    depends_on:
      - eureka-server
      - auth-service
      - student-service
      - grade-service
    environment:
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_SERVER: http://eureka-server:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8080:8080"
    networks:
      - educore-network

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - api-gateway
    environment:
      VITE_API_BASE_URL: http://api-gateway:8080
    ports:
      - "3000:3000"
    networks:
      - educore-network

volumes:
  mysql_data:

networks:
  educore-network:
    driver: bridge