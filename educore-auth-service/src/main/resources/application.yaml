server:
  port: 8081
  forward-headers-strategy: framework

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://mysql:3306/auth_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Schema is managed by Flyway. Hibernate only validates that the
      # entity model still matches the migrated schema at startup.
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Legacy databases were created by Hibernate's ddl-auto=update before
    # Flyway was introduced. Treat those existing schemas as the V1
    # baseline so the first migration is not re-applied on top of tables
    # that already exist. New / empty databases simply run V1 normally.
    baseline-on-migrate: true
    baseline-version: 1

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000

# Bootstrap a single admin user on first startup. ADMIN_INIT_PASSWORD is
# REQUIRED on first boot (when no admin row exists). It is intentionally
# left without a default so deployments cannot accidentally ship with a
# well-known password.
admin:
  init:
    username: ${ADMIN_USERNAME:admin}
    email: ${ADMIN_EMAIL:admin@educore.local}
    password: ${ADMIN_INIT_PASSWORD:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  tracing:
    sampling:
      probability: 1.0        # trace 100% request (dùng cho dev/demo)
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}