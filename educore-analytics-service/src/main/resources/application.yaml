server:
  port: 8084
  forward-headers-strategy: framework

spring:
  application:
    name: analytics-service

  datasource:
    url: jdbc:mysql://mysql:3306/analytics_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Schema is managed by Flyway. Hibernate only validates that the
      # entity model still matches the migrated schema at startup.
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  jackson:
    serialization:
      write-dates-as-timestamps: false

  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: analytics-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.educore.common"
        spring.json.use.type.headers: true
    listener:
      concurrency: 3

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

  instance:
    prefer-ip-address: true

security:
  jwt:
    secret: ${JWT_SECRET}
    token-prefix: Bearer
    header: Authorization

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.springframework.kafka: DEBUG
    com.educore.analytics: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  tracing:
    sampling:
      probability: 1.0        # trace 100% request (dùng cho dev/demo)
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}